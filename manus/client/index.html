<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary Meta Tags -->
    <title>Hantavirus Outbreak Tracker | Real-Time Global Monitoring</title>
    <meta name="description" content="Real-time hantavirus outbreak tracker. Monitor confirmed cases, deaths, and affected regions worldwide. Stay informed with latest developments and health information." />
    <meta name="keywords" content="hantavirus, outbreak, tracker, cases, monitoring, health, disease, epidemic" />
    <meta name="author" content="Hantavirus Tracker" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hantavirus-tracker.manus.space/" />
    <meta property="og:title" content="Hantavirus Outbreak Tracker | Real-Time Global Monitoring" />
    <meta property="og:description" content="Track confirmed hantavirus cases, deaths, and affected regions worldwide in real-time." />
    <meta property="og:image" content="https://hantavirus-tracker.manus.space/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Hantavirus Tracker" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://hantavirus-tracker.manus.space/" />
    <meta name="twitter:title" content="Hantavirus Outbreak Tracker" />
    <meta name="twitter:description" content="Real-time monitoring of hantavirus cases worldwide." />
    <meta name="twitter:image" content="https://hantavirus-tracker.manus.space/og-image.png" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://hantavirus-tracker.manus.space/" />
    
    <!-- Structured Data (MedicalCondition Schema) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MedicalWebPage",
      "name": "Hantavirus Outbreak Tracker",
      "url": "https://hantavirus-tracker.manus.space/",
      "description": "Real-time tracker monitoring hantavirus outbreaks worldwide with confirmed cases, deaths, and affected regions.",
      "about": {
        "@type": "MedicalCondition",
        "name": "Hantavirus",
        "description": "Hantavirus is a potentially deadly virus spread primarily by infected rodents through contact with their urine, droppings, or saliva.",
        "possibleTreatment": {
          "@type": "MedicalTherapy",
          "name": "Supportive care and medical monitoring"
        },
        "riskFactor": {
          "@type": "MedicalRiskFactor",
          "name": "Rodent exposure"
        }
      },
      "author": {
        "@type": "Organization",
        "name": "Hantavirus Tracker"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Hantavirus Tracker"
      }
    }
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script defer src="%VITE_ANALYTICS_ENDPOINT%/umami" data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
